services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_control}
      POSTGRES_USER: ${POSTGRES_USER:-finance_control}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_control}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance_control} -d ${POSTGRES_DB:-finance_control}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://finance_control:finance_control@postgres:5432/finance_control
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  telegram:
    build:
      context: ./telegram
    env_file:
      - .env.example
    environment:
      FINANCE_CONTROL_API_URL: http://backend:8000
    volumes:
      - telegram_data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  telegram_data:
